name: Publish AI domain sets

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set variables
        run: |
          echo "RELEASE_NAME=Published on $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "TAG_NAME=publish-$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_ENV"

      - name: Checkout the default branch
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build publish artifacts
        run: python3 scripts/build_domainsets.py --output-dir publish

      - name: Push assets to release branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd publish || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B release
          git add .
          git commit -m "Publish domain sets on $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin release

      - name: Publish GitHub release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${TAG_NAME}" publish/*.txt \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "${RELEASE_NAME}" \
            --notes "Published DOMAIN-SET TXT files for direct download."

      - name: Purge jsDelivr CDN
        run: |
          cd publish || exit 1
          for file in *.txt; do
            curl --silent --show-error --fail "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${file}"
            echo
          done
